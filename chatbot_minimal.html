<!DOCTYPE html>
<html lang="de">
<head>
    <link rel="icon" type="image/png" href="icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outfit-Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(145deg, #fde8f5 0%, #e8d5f5 40%, #d5e8f5 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-container {
            width: 450px;
            height: 650px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 24px 70px rgba(160, 80, 200, 0.18);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #b06aed, #e84dac);
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 13px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .header-info h2 {
            color: white;
            font-size: 17px;
            font-weight: 700;
        }

        .header-info p {
            color: rgba(255, 255, 255, 0.75);
            font-size: 11.5px;
            margin-top: 2px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: #fdf8ff;
        }

        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 9px;
        }

        .message-row.user {
            flex-direction: row-reverse;
        }

        .mini-avatar {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #b06aed, #e84dac);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .bubble {
            max-width: 74%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 13.5px;
            line-height: 1.55;
        }

        .bot-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.07);
        }

        .user-bubble {
            background: linear-gradient(135deg, #b06aed, #e84dac);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .typing-row {
            display: flex;
            align-items: flex-end;
            gap: 9px;
        }

        .typing-bubble {
            background: white;
            padding: 13px 18px;
            border-radius: 20px;
            border-bottom-left-radius: 5px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.07);
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: #c07aee;
            border-radius: 50%;
            animation: bounce 1.3s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-7px); opacity: 1; }
        }

        .chat-buttons {
            padding: 14px 16px;
            border-top: 1px solid #f3eaff;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: white;
            min-height: 62px;
        }

        .choice-btn {
            background: #f9f0ff;
            border: 1.5px solid #e5c8ff;
            color: #8b30cc;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .choice-btn:hover {
            background: linear-gradient(135deg, #b06aed, #e84dac);
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(176, 106, 237, 0.35);
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: #fdf8ff; }
        .chat-messages::-webkit-scrollbar-thumb { background: #e5c8ff; border-radius: 2px; }



        /* Chat input row */
        .chat-input-row {
            padding: 12px 14px;
            border-top: 1px solid #f3eaff;
            display: flex; gap: 8px; align-items: center;
            background: white;
        }
        .chat-input-row input {
            flex: 1; padding: 10px 16px;
            border: 1.5px solid #e5c8ff; border-radius: 22px;
            font-size: 13.5px; outline: none;
            font-family: 'Segoe UI', sans-serif; color: #333;
        }
        .chat-input-row input:focus { border-color: #b06aed; }
        .chat-input-row input:disabled { background: #faf7ff; color: #aaa; }
        .chat-input-row button {
            width: 42px; height: 42px; flex-shrink: 0;
            background: linear-gradient(135deg, #b06aed, #e84dac);
            border: none; border-radius: 50%;
            color: white; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.2s;
        }
        .chat-input-row button:hover { opacity: 0.85; }
        .chat-input-row button:disabled { opacity: 0.45; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="avatar">🤖</div>
        <div class="header-info">
            <h2>Fit-Bot</h2>
            <p>Outfit-Assistent • Online</p>
        </div>
    </div>
    <div class="chat-messages" id="messages"></div>
    <div class="chat-input-row">
        <input type="text" id="user-input" placeholder="Nachricht eingeben..." autocomplete="off">
        <button id="send-btn">&#10148;</button>
    </div>
</div>

<script>
    const SYSTEM_PROMPT = `Du bist ein sachlicher Outfit-Assistent für semi-formelle Anlässe. Antworte immer kurz und prägnant – maximal 2-3 knappe Sätze. Keine Emojis. Kein Small Talk. Nur das Notwendige.

Deine Aufgabe ist es, im Gespräch folgende Informationen zu erfassen:
1. Anlass – lass die Person selbst nennen, für welchen Anlass ein Outfit gesucht wird.
2. Einordnung des Anlasses – falls der Anlass unklar ist, präzisiere ihn kurz.
3. Gewünschter Stil / gewünschte Wirkung – erfasse, wie das Outfit wirken soll.
4. Budget / Preisrahmen – frage nach dem Budget, falls nicht genannt.
5. Weitere Präferenzen – erfasse zusätzliche Wünsche (z. B. Farben, Passform, Komfort, Wetterbezug), sofern relevant.

Gesprächslogik:
- Reagiere flexibel, keine starre Reihenfolge.
- Übernimm bereits genannte Informationen, frage nur nach, was fehlt.
- Kläre unklare Angaben knapp.
- Sobald alle Kerninformationen vorliegen, fasse sie sachlich zusammen.
- Beende das Gespräch nach der Zusammenfassung und weise darauf hin, dass die Person zur Umfrage zurückkehren kann: [UMFRAGE-LINK HIER EINFÜGEN]

Wichtige Einschränkungen – halte diese strikt ein:
- Nenne keine realen Produkte.
- Nenne keine Marken.
- Gib keine konkreten Outfits aus.
- Verwende keine Produktbilder oder Artikellisten.

Antworte auf Deutsch.`;

    const API_URL = 'https://api.openai.com/v1/chat/completions';
    const MODEL = 'gpt-4o-mini';
    const INITIAL_MSG = 'Hallo. Für welchen Anlass suchst du ein Outfit?';

    // ⚠️ API-Key hier eintragen (nur für kontrollierte Studienumgebung)
    const apiKey = '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';
    let conversationHistory = [];
    let isBusy = false;

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
    }

    function addBotMessage(text) {
        const row = document.createElement('div');
        row.className = 'message-row';
        row.innerHTML = `<div class="mini-avatar">🤖</div><div class="bubble bot-bubble">${escapeHtml(text)}</div>`;
        document.getElementById('messages').appendChild(row);
        document.getElementById('messages').scrollTop = 999999;
    }

    function addUserMessage(text) {
        const row = document.createElement('div');
        row.className = 'message-row user';
        row.innerHTML = `<div class="bubble user-bubble">${escapeHtml(text)}</div>`;
        document.getElementById('messages').appendChild(row);
        document.getElementById('messages').scrollTop = 999999;
    }

    function showTyping() {
        if (document.getElementById('typing-indicator')) return;
        const row = document.createElement('div');
        row.className = 'typing-row';
        row.id = 'typing-indicator';
        row.innerHTML = `<div class="mini-avatar">🤖</div><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
        document.getElementById('messages').appendChild(row);
        document.getElementById('messages').scrollTop = 999999;
    }

    function removeTyping() {
        const el = document.getElementById('typing-indicator');
        if (el) el.remove();
    }

    async function callLLM(userMessage) {
        conversationHistory.push({ role: 'user', content: userMessage });
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
                model: MODEL,
                messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...conversationHistory],
                max_tokens: 150,
                temperature: 0.5
            })
        });
        if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.error?.message || `HTTP ${response.status}`);
        }
        const data = await response.json();
        const botMsg = data.choices[0].message.content.trim();
        conversationHistory.push({ role: 'assistant', content: botMsg });
        return botMsg;
    }

    function setInputState(disabled) {
        isBusy = disabled;
        document.getElementById('user-input').disabled = disabled;
        document.getElementById('send-btn').disabled = disabled;
    }

    async function handleSend() {
        if (isBusy) return;
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        addUserMessage(text);
        setInputState(true);
        showTyping();
        try {
            const reply = await callLLM(text);
            removeTyping();
            addBotMessage(reply);
        } catch (e) {
            removeTyping();
            addBotMessage('Fehler. API-Key prüfen.');
            console.error(e);
        } finally {
            setInputState(false);
            document.getElementById('user-input').focus();
        }
    }

    function startChat() {
        conversationHistory = [];
        showTyping();
        setTimeout(() => {
            removeTyping();
            addBotMessage(INITIAL_MSG);
            conversationHistory.push({ role: 'assistant', content: INITIAL_MSG });
            document.getElementById('user-input').focus();
        }, 600);
    }

    document.getElementById('user-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') handleSend();
    });

    document.getElementById('send-btn').addEventListener('click', handleSend);

    // Init
    startChat();
</script>
</body>
</html>
